name: Daily Pharmacy Sync

on:
  schedule:
    - cron: '0 3 * * *'  # KST 12:00 (UTC 03:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily sync
        id: daily_sync
        shell: bash
        run: |
          set +e
          python scripts/sync_daily.py 2>&1 | tee /tmp/sync-daily.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          DRUG_API_KEY: ${{ secrets.DRUG_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MARKERS_JSON_PATH: frontend/public/markers.json
          STAFF_XLSX_PATH: asset/12.의료기관별상세정보서비스_10_기타인력정보 2025.6.xlsx
          STAFF_PERIOD: "2025.6"
          STAFF_XLSX_UPSERT_ENABLED: "true"
          STAFF_XLSX_SKIP_API_REFRESHED: "true"
          STAFF_LOOKUP_BASELINE_DATE: "2025-07-01"
          STAFF_LOOKUP_DELAY_SECONDS: "0.15"

      - name: Audit active pharmacies missing HIRA ykiho
        if: always()
        shell: bash
        run: |
          set +e
          python scripts/audit_missing_ykiho.py \
            --apply \
            --refresh-markers \
            --delay 0.02 \
            --json /tmp/missing-ykiho-audit.json \
            2>&1 | tee -a /tmp/sync-daily.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "[WARNING] missing ykiho audit failed with status $status" | tee -a /tmp/sync-daily.log
          fi
          exit 0
        env:
          DRUG_API_KEY: ${{ secrets.DRUG_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Write sync log
        if: always()
        run: python scripts/load/sync_log.py
        env:
          SYNC_EXIT_CODE: ${{ steps.daily_sync.outputs.exit_code }}
          SYNC_LOG_RAW_PATH: /tmp/sync-daily.log
          SYNC_LOG_JSON_PATH: frontend/public/sync-log.json
          MARKERS_JSON_PATH: frontend/public/markers.json

      - name: Commit updated markers and sync log
        if: always()
        run: |
          if git diff --quiet -- frontend/public/markers.json frontend/public/sync-log.json; then
            echo "markers.json and sync-log.json are already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/markers.json frontend/public/sync-log.json
          git commit -m "chore: refresh pharmacy sync data"
          git push

      - name: Upload sync artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pharmacy-sync-artifacts
          path: |
            frontend/public/markers.json
            frontend/public/sync-log.json
            /tmp/missing-ykiho-audit.json
            /tmp/sync-daily.log
          retention-days: 7

      - name: Fail workflow if sync failed
        if: ${{ steps.daily_sync.outputs.exit_code != '0' }}
        run: exit 1
