<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약국 매핑 테이블</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, 'Apple SD Gothic Neo', sans-serif; margin: 0; background: #f7f7f9; }
    header { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; gap: 12px; align-items: center; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 18px; margin: 0; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .controls input[type="text"] { padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 8px; width: 240px; }
    .controls label { display: inline-flex; gap: 6px; align-items: center; font-size: 14px; color: #374151; }
    .controls button { padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; cursor: pointer; }
    main { padding: 12px 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; }
    thead th { position: sticky; top: 52px; background: #fafafa; border-bottom: 1px solid #e5e7eb; padding: 10px; font-size: 13px; color: #374151; }
    tbody td { border-top: 1px solid #f0f1f3; padding: 10px; font-size: 13px; color: #111827; vertical-align: top; }
    .badge-ok { color: #065f46; background: #d1fae5; padding: 3px 8px; border-radius: 999px; font-weight: 600; font-size: 12px; }
    .badge-no { color: #7c2d12; background: #ffedd5; padding: 3px 8px; border-radius: 999px; font-weight: 600; font-size: 12px; }
    .muted { color: #6b7280; }
    .nowrap { white-space: nowrap; }
    .small { font-size: 12px; }
  </style>
  <script>
  async function loadCSV(url) {
    const res = await fetch(url);
    const text = await res.text();
    const lines = text.split('\n').filter(Boolean);
    const headers = lines[0].split(',');
    const out = [];
    for (let i = 1; i < lines.length; i++) {
      const row = parseCSVLine(lines[i]);
      if (!row || row.length < headers.length) continue;
      const obj = {};
      headers.forEach((h, idx) => obj[h] = (row[idx] || '').trim());
      out.push(obj);
    }
    return out;
  }
  function parseCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') inQ = !inQ; else if (ch === ',' && !inQ) { result.push(cur); cur = ''; } else cur += ch;
    }
    result.push(cur);
    return result;
  }
  function normalize(s){ return (s||'').replace(/\s+/g,' ').trim(); }
  function baseAddress(addr){ return normalize((addr||'').split(',')[0]); }

  async function init() {
    const csvUrl = 'asset/2.%EC%95%BD%EA%B5%AD%EC%A0%95%EB%B3%B4%EC%84%9C%EB%B9%84%EC%8A%A4%202025.6.csv';
    const mapUrl = 'asset/kakao_place_mappings.json';
    const [rows, mapRes] = await Promise.all([loadCSV(csvUrl), fetch(mapUrl).then(r=>r.json()).catch(()=>({mappings:[]}))]);
    const idToPlace = {};
    (mapRes.mappings||[]).forEach(m=>{ if(m.id && m.kakaoPlaceUrl) idToPlace[m.id]=m.kakaoPlaceUrl; });

    const tbody = document.querySelector('#tbl tbody');
    const totalEl = document.getElementById('statTotal');
    const mappedEl = document.getElementById('statMapped');
    const unmappedEl = document.getElementById('statUnmapped');
    const filterUnmapped = document.getElementById('filterUnmapped');
    const qInput = document.getElementById('q');

    function render() {
      const q = normalize(qInput.value).toLowerCase();
      tbody.innerHTML = '';
      let total = 0, mapped = 0;
      for (const r of rows) {
        const id = r['암호화요양기호'];
        const name = normalize(r['요양기관명']);
        const addr = normalize(r['주소']);
        const x = r['좌표(X)'];
        const y = r['좌표(Y)'];
        if (!id || !name || !addr) continue;
        const mappedUrl = idToPlace[id] || '';
        const isMapped = !!mappedUrl;
        total++;
        if (isMapped) mapped++;
        if (filterUnmapped.checked && isMapped) continue;
        if (q && !(name.toLowerCase().includes(q) || addr.toLowerCase().includes(q))) continue;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="nowrap small">${id}</td>
          <td>${name}</td>
          <td class="small">${baseAddress(addr)}</td>
          <td class="nowrap small muted">${x}, ${y}</td>
          <td>${isMapped ? `<a href="${mappedUrl}" target="_blank" rel="noopener">열기</a>` : '<span class="badge-no">미매핑</span>'}</td>
        `;
        tbody.appendChild(tr);
      }
      totalEl.textContent = total.toLocaleString();
      mappedEl.textContent = mapped.toLocaleString();
      unmappedEl.textContent = (total - mapped).toLocaleString();
    }

    document.getElementById('btnExport').addEventListener('click', () => {
      // 내보내기: 현재 보이는 행만 CSV
      const rowsOut = [['id','name','baseAddress','x','y','kakaoPlaceUrl']];
      const q = normalize(qInput.value).toLowerCase();
      for (const r of rows) {
        const id = r['암호화요양기호'];
        const name = normalize(r['요양기관명']);
        const addr = normalize(r['주소']);
        const x = r['좌표(X)'];
        const y = r['좌표(Y)'];
        if (!id || !name || !addr) continue;
        const mappedUrl = idToPlace[id] || '';
        const isMapped = !!mappedUrl;
        if (filterUnmapped.checked && isMapped) continue;
        if (q && !(name.toLowerCase().includes(q) || addr.toLowerCase().includes(q))) continue;
        rowsOut.push([id, name, baseAddress(addr), x, y, mappedUrl]);
      }
      const csv = rowsOut.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(["\ufeff"+csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'pharmacies_table.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    qInput.addEventListener('input', render);
    filterUnmapped.addEventListener('change', render);
    render();
  }
  window.addEventListener('DOMContentLoaded', init);
  </script>
</head>
<body>
  <header>
    <h1><i class="fa-solid fa-table"></i> 약국 매핑 테이블</h1>
    <div class="controls">
      <input id="q" type="text" placeholder="검색(상호/주소)" />
      <label><input id="filterUnmapped" type="checkbox" /> 미매핑만</label>
      <button id="btnExport"><i class="fa-solid fa-file-export"></i> 내보내기</button>
      <div class="muted small">총: <span id="statTotal">0</span> · 매핑: <span id="statMapped">0</span> · 미매핑: <span id="statUnmapped">0</span></div>
      <a class="small" href="/" style="margin-left:8px;">← 지도</a>
    </div>
  </header>
  <main>
    <table id="tbl">
      <thead>
        <tr>
          <th class="nowrap">ID</th>
          <th>상호</th>
          <th>주소(쉼표 전)</th>
          <th class="nowrap">좌표</th>
          <th>카카오</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>
</body>
</html>
